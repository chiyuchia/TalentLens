services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ./.env.production
    environment:
      DATABASE_URL: sqlite:////data/talentlens.sqlite3
      UPLOAD_DIR: /uploads
    volumes:
      - talentlens_data:/data
      - talentlens_uploads:/uploads
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

volumes:
  talentlens_data:
  talentlens_uploads:

